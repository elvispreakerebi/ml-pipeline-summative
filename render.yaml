services:
  - type: web
    name: emotion-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: MODEL_PATH
        value: /app/models/emotion_classifier.h5
    healthCheckPath: /health

  - type: web
    name: emotion-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://emotion-api.onrender.com
